<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin&display=swap" rel="stylesheet">

<title>婚禮回憶上傳</title>

<style>
body {
  margin: 0;
  font-family: "Kaisei Tokumin", serif;
  background: #f9f5f0;
  color: #6b4f3b;
  text-align: center;
}

/* 背景柔和裝飾 */
.bg-decor {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
  background-image: radial-gradient(#f3c6c6 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.3;
}

/* 主容器 */
.container {
  padding: 80px 20px;
}

/* 標題 */
.title {
  font-size: 36px;
  margin-bottom: 10px;
  letter-spacing: 2px;
}

.subtitle {
  font-size: 18px;
  margin-bottom: 50px;
}

/* 大圓上傳按鈕 */
.upload-circle {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  background: linear-gradient(145deg, #e8b4b8, #c97b84);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: 0.3s;
  position: relative;
}

.upload-circle:hover {
  transform: scale(1.05);
  box-shadow: 0 15px 40px rgba(0,0,0,0.15);
}

.upload-text {
  color: white;
  font-size: 20px;
  line-height: 1.6;
}

/* 小裝飾花 */
.flower {
  position: absolute;
  font-size: 18px;
  color: #e5b3b8;
}

.flower1 { top: 10%; left: 20%; }
.flower2 { top: 20%; right: 15%; }
.flower3 { bottom: 15%; left: 18%; }
.flower4 { bottom: 10%; right: 20%; }

/* 底部提示 */
.note {
  margin-top: 40px;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="bg-decor"></div>

<div class="container">

  <div class="title">留下今天的回憶 ✿</div>
  <div class="subtitle">
    把你拍到的美好瞬間，分享給我們 💛
  </div>

  <!-- 花花裝飾 -->
  <div class="flower flower1">✿</div>
  <div class="flower flower2">✿</div>
  <div class="flower flower3">✿</div>
  <div class="flower flower4">✿</div>

  <!-- 上傳按鈕 -->
    <div class="upload-circle">
      <div class="upload-text">
        <input type="file" id="uploadInput" style="display:none">
<button onclick="document.getElementById('uploadInput').click()">
  📸 上傳照片
</button>
      </div>
    </div>
  
  <div class="note">
    立即可上傳（無需登入）
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getStorage,ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

  // 貼上你的 config
  const firebaseConfig = {
  apiKey: "AIzaSyAdbheXFlXRFMlJNc_ogWI0OAqCo6stG5k",
  authDomain: "wedding-upload-b2bb2.firebaseapp.com",
  projectId: "wedding-upload-b2bb2",
  storageBucket: "gs://wedding-upload-b2bb2.firebasestorage.app",
    messagingSenderId: "132772019067",
    appId: "1:132772019067:web:175bc2a4e54e15786dbde",
    measurementId: "G-Y66D7W1N1G"
  };

  const app = initializeApp(firebaseConfig);
  const storage = getStorage(app);

  window.storage = storage;
  window.ref = ref;
  window.uploadByte = uploadBytes;
  window.getDownloadURL = getDownloadURL;

   console.log("Firebase 模組已成功載入餅開放全域存取!");

  function uploadFile(file) {
  const storageRef = ref(storage, "uploads/" + Date.now() + "_" + file.name);
  return uploadBytes(storageRef, file);
}

  document.getElementById("uploadInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  uploadFile(file)
    .then(() => {
      alert("上傳成功 💛");
      console.log("成功上傳");
    })
    .catch(err => {
      console.error("錯誤：", err);
      alert("上傳失敗 😢");
    });
});
</script> 
</body>
</html>
